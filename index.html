<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopédia de Entidades & Bestiário - Sobrevivência 3D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-dark: #050308;
            --bg-panel: rgba(13, 10, 20, 0.6);
            --bg-card: rgba(21, 17, 31, 0.6);
            --bg-card-hover: rgba(36, 26, 56, 0.8);
            
            --text-primary: #f0f0f5;
            --text-secondary: #8c82a1;
            --border-glow: #5e35b1;
            --border-subtle: rgba(94, 53, 177, 0.3);
            
            --tag-basic: #4caf50;
            --tag-defender: #0288d1;
            --tag-limbo: #d500f9;
            --tag-elite: #ff3d00;
            --tag-god: #ffea00;

            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
            
            --clip-angle: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
            --clip-angle-btn: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* BACKGROUND TECH GRID */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(94, 53, 177, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(94, 53, 177, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            z-index: -1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 2.5rem;
            background: linear-gradient(180deg, rgba(5,3,8,0.95) 0%, rgba(13,10,20,0.8) 100%);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--border-subtle);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--text-primary);
            text-shadow: 0 0 15px rgba(213, 0, 249, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: "///";
            color: var(--tag-god);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--tag-god);
        }

        header h1 span {
            color: var(--tag-god);
            text-shadow: 0 0 15px rgba(255, 234, 0, 0.4);
        }

        .search-filter-container {
            display: flex;
            gap: 1rem;
            align-items: center;
            position: relative;
        }

        .search-filter-container::before {
            content: "🔍";
            position: absolute;
            left: 12px;
            font-size: 0.9rem;
            opacity: 0.5;
            pointer-events: none;
        }

        .search-bar {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: 2px;
            padding: 0.7rem 1rem 0.7rem 2.5rem;
            color: white;
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 1px;
            width: 300px;
            outline: none;
            transition: all 0.3s ease;
            clip-path: var(--clip-angle-btn);
        }

        .search-bar:focus {
            border-color: var(--tag-god);
            background: rgba(255, 234, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 234, 0, 0.2);
        }

        /* MAIN SECTION */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* SIDEBAR / ENEMY LIST */
        .sidebar {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-subtle);
            background: linear-gradient(90deg, rgba(5,3,8,0.8) 0%, rgba(13,10,20,0.4) 100%);
            backdrop-filter: blur(5px);
            position: relative;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tab-btn {
            background: rgba(21, 17, 31, 0.6);
            border: 1px solid var(--border-subtle);
            padding: 0.5rem 1rem;
            color: var(--text-secondary);
            font-family: var(--font-display);
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: var(--clip-angle-btn);
            position: relative;
        }

        .tab-btn:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
            background: rgba(94, 53, 177, 0.2);
        }

        .tab-btn.active {
            background: rgba(213, 0, 249, 0.15);
            border-color: var(--tag-limbo);
            color: white;
            box-shadow: inset 0 0 10px rgba(213, 0, 249, 0.3);
            text-shadow: 0 0 5px var(--tag-limbo);
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.2rem;
            align-content: start;
        }

        /* SCROLLBARS CYBERPUNK */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-left: 1px solid var(--border-subtle);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-subtle);
            border-radius: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--tag-limbo);
        }

        /* CARDS */
        .enemy-card {
            background-color: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 150px;
            clip-path: var(--clip-angle);
        }

        .enemy-card:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--card-color, var(--tag-limbo));
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .enemy-card.selected {
            background-color: rgba(36, 26, 56, 0.95);
            border-color: var(--card-color, var(--tag-god));
        }

        .enemy-card.selected::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 20px var(--card-color-alpha, rgba(255,255,255,0.1));
            pointer-events: none;
        }

        .enemy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--card-color, var(--text-secondary));
            box-shadow: 0 0 10px var(--card-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        .card-difficulty {
            font-family: var(--font-display);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--card-color);
            color: var(--card-color);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            font-weight: 900;
            text-shadow: 0 0 5px var(--card-color);
        }

        .card-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: auto;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-category::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--card-color);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--card-color);
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 0.6rem;
            margin-top: 0.5rem;
            font-family: var(--font-display);
        }

        .card-stats span strong {
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        /* DOSSIER PANEL (RIGHT VIEW) */
        .dossier {
            width: 50%;
            background-color: var(--bg-panel);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* Holographic model viewport */
        .dossier-viewport {
            height: 320px;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(94, 53, 177, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%);
            border-bottom: 2px solid var(--border-subtle);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -20px 30px -20px var(--dossier-color, #000);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* HUD OVERLAYS */
        .viewport-hud {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            font-family: var(--font-display);
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .hud-target {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .hud-target::before {
            content: ''; position: absolute;
            top: -10px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 20px; background: rgba(255,255,255,0.2);
        }
        .hud-target::after {
            content: ''; position: absolute;
            bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 20px; background: rgba(255,255,255,0.2);
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--dossier-color, var(--tag-limbo));
            box-shadow: 0 0 15px var(--dossier-color, var(--tag-limbo)), 0 0 30px var(--dossier-color, var(--tag-limbo));
            animation: scan 4s ease-in-out infinite alternate;
            z-index: 2;
            pointer-events: none;
            opacity: 0.4;
        }

        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { top: calc(100% - 4px); opacity: 0; }
        }

        /* Dossier Content */
        .dossier-body {
            padding: 2rem;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .dossier-title-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 1.5rem;
            position: relative;
        }

        .dossier-name {
            font-family: var(--font-display);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--dossier-color-alpha);
            color: white;
            text-transform: uppercase;
        }

        #dossier-category {
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: var(--dossier-color);
            display: block;
            margin-top: 5px;
        }

        .dossier-difficulty-badge {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--dossier-color);
            padding: 0.5rem 1rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--dossier-color);
            text-shadow: 0 0 10px var(--dossier-color);
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0% 100%);
            box-shadow: 0 0 20px var(--dossier-color-alpha);
        }

        .dossier-lore {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            font-style: italic;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            padding: 1rem 1.5rem;
            border-left: 3px solid var(--dossier-color);
            position: relative;
        }
        .dossier-lore::before {
            content: '«'; font-family: var(--font-display); font-size: 2rem;
            position: absolute; left: 5px; top: -5px; color: var(--dossier-color); opacity: 0.3;
        }

        .dossier-subtitle {
            font-family: var(--font-display);
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: var(--text-primary);
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }

        /* Stat Bars */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-subtle);
            padding: 0.8rem 1rem;
            clip-path: var(--clip-angle-btn);
            position: relative;
        }

        .stat-label {
            font-family: var(--font-display);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .stat-val {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        /* Animated Striped Progress Bar */
        .stat-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            margin-top: 0.6rem;
            overflow: hidden;
            position: relative;
        }

        .stat-bar-fill {
            height: 100%;
            background-color: var(--dossier-color);
            background-image: linear-gradient(
                45deg, 
                rgba(255, 255, 255, 0.2) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255, 255, 255, 0.2) 50%, 
                rgba(255, 255, 255, 0.2) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 15px 15px;
            width: 0%;
            transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
            animation: moveStripes 1s linear infinite;
            box-shadow: 0 0 10px var(--dossier-color);
        }

        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 15px 0; }
        }

        /* Tabs inside dossier */
        .dossier-tabs {
            display: flex;
            border-bottom: 2px solid rgba(255,255,255,0.05);
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .dossier-tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.6rem 1.5rem;
            font-family: var(--font-display);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            bottom: -2px; /* overlap border */
        }

        .dossier-tab-btn:hover {
            color: var(--text-primary);
        }

        .dossier-tab-btn.active {
            color: var(--dossier-color);
            border-bottom-color: var(--dossier-color);
            text-shadow: 0 0 10px var(--dossier-color-alpha);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Skills Lists */
        .skill-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-left: 3px solid var(--dossier-color);
            padding: 1.2rem;
            margin-bottom: 1rem;
            clip-path: var(--clip-angle-btn);
            transition: transform 0.2s ease;
        }
        
        .skill-item:hover {
            transform: translateX(5px);
            background: rgba(255,255,255,0.05);
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.6rem;
        }

        .skill-name {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .skill-tag {
            font-family: var(--font-display);
            font-size: 0.65rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(213, 0, 249, 0.15);
            border: 1px solid var(--tag-limbo);
            color: var(--text-primary);
            padding: 0.2rem 0.6rem;
            box-shadow: 0 0 5px rgba(213, 0, 249, 0.3);
        }

        .skill-tag.passive {
            background: rgba(2, 136, 209, 0.15);
            border-color: var(--tag-defender);
            box-shadow: 0 0 5px rgba(2, 136, 209, 0.3);
        }

        .skill-desc {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text-secondary);
        }

        /* Spawning details info box */
        .info-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--dossier-color);
            padding: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            clip-path: var(--clip-angle);
            box-shadow: inset 0 0 20px var(--dossier-color-alpha);
        }

        .info-box strong {
            color: var(--text-primary);
            font-family: var(--font-display);
            letter-spacing: 1px;
        }

        /* Mobile Adjustments */
        @media (max-width: 1000px) {
            body { overflow-y: auto; height: auto; }
            main { flex-direction: column; }
            .sidebar, .dossier { width: 100%; border-right: none; }
            .sidebar { height: 50vh; min-height: 400px; border-bottom: 2px solid var(--border-subtle); }
            .dossier { height: auto; overflow: visible; }
            header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .search-bar { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>BESTIÁRIO <span>///</span> ENCICLOPÉDIA</h1>
        <div class="search-filter-container">
            <input type="text" class="search-bar" id="search-input" placeholder="SISTEMA DE BUSCA ATIVO...">
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="filter-tabs" id="filter-tabs">
                <button class="tab-btn active" data-filter="all">Todos</button>
                <button class="tab-btn" data-filter="comum">Comuns</button>
                <button class="tab-btn" data-filter="guardião">Guardiões</button>
                <button class="tab-btn" data-filter="limbo">Bosses do Limbo</button>
                <button class="tab-btn" data-filter="elite">Chefes de Elite</button>
                <button class="tab-btn" data-filter="deus">Deuses</button>
            </div>
            
            <div class="list-container" id="list-container">
                </div>
        </div>

        <div class="dossier" id="dossier-panel">
            <div class="dossier-viewport">
                <div class="hud-target"></div>
                <div class="scanner-line"></div>
                <div id="canvas-container"></div>
                <div class="viewport-hud">
                    <span>STATUS: <span style="color:var(--tag-basic);">ONLINE</span></span>
                    <span>SHAPE_ID: <span id="shape-info" style="color:var(--dossier-color);">OCTAHEDRON</span></span>
                </div>
            </div>

            <div class="dossier-body">
                <div class="dossier-title-section">
                    <div>
                        <h2 class="dossier-name" id="dossier-name">O Faraó</h2>
                        <span id="dossier-category">DEUS</span>
                    </div>
                    <div class="dossier-difficulty-badge" id="dossier-difficulty">SS</div>
                </div>

                <p class="dossier-lore" id="dossier-lore">A entidade suprema e governante das areias do Limbo...</p>

                <div>
                    <h3 class="dossier-subtitle"><span style="color:var(--dossier-color);">///</span> BIOMETRIA DA ENTIDADE</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">Integridade Estrutural (HP)</div>
                            <div class="stat-val" id="stat-hp">150.000</div>
                            <div class="stat-bar-container">
                                <div class="stat-bar-fill" id="bar-hp"></div>
                            </div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Fator de Mobilidade</div>

        // 3D VIEWER LOGIC (THREE.JS)
        let scene, camera, renderer, currentMesh;

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 1.8, 6.5);
            camera.lookAt(0, 0.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.45);
            scene.add(ambient);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
            dirLight.position.set(4, 8, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);

            const glowLight = new THREE.PointLight(0xff00ff, 0.8, 8);
            glowLight.position.set(0, 1.5, 1.5);
            scene.add(glowLight);

            const gridHelper = new THREE.GridHelper(8, 12, 0x5e35b1, 0x241a38);
            gridHelper.position.y = -0.8;
            scene.add(gridHelper);

            const ringGeo = new THREE.RingGeometry(1.6, 1.65, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xd500f9, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -0.79;
            scene.add(ring);

            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            container.addEventListener('mousemove', (e) => {
                if (!isDragging || !currentMesh) return;
                const deltaMove = {
                    x: e.clientX - previousMousePosition.x,
                    y: e.clientY - previousMousePosition.y
                };
                currentMesh.rotation.y += deltaMove.x * 0.005;
                currentMesh.rotation.x += deltaMove.y * 0.005;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            window.addEventListener('mouseup', () => { isDragging = false; });

            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            container.addEventListener('touchmove', (e) => {
                if (!isDragging || !currentMesh) return;
                const deltaMove = {
                    x: e.touches[0].clientX - previousMousePosition.x,
                    y: e.touches[0].clientY - previousMousePosition.y
                };
                currentMesh.rotation.y += deltaMove.x * 0.008;
                currentMesh.rotation.x += deltaMove.y * 0.008;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            container.addEventListener('touchend', () => { isDragging = false; });

            function animate() {
                requestAnimationFrame(animate);
                if (currentMesh && !isDragging) {
                    currentMesh.rotation.y += 0.006;
                }
                ring.rotation.z += 0.002;
                renderer.render(scene, camera);
            }
            animate();
        }

        function update3DModel(shapeType, colorHex) {
            if (!scene) return;
            if (currentMesh) scene.remove(currentMesh);

            const group = new THREE.Group();
            const colorVal = parseInt(colorHex.replace('#', '0x'));
            
            const mat = new THREE.MeshStandardMaterial({
                color: colorVal,
                emissive: colorVal,
                emissiveIntensity: shapeType === 'farao' ? 0.4 : 0.3,
                metalness: shapeType === 'smith' || shapeType === 'farao' ? 0.8 : 0.5,
                roughness: shapeType === 'smith' || shapeType === 'farao' ? 0.2 : 0.3,
            });

            document.getElementById('shape-info').textContent = shapeType;

            if (shapeType === 'farao') {
                const bodyGeo = new THREE.BoxGeometry(1.2, 1.6, 0.8);
                const body = new THREE.Mesh(bodyGeo, mat);
                body.position.y = 0.8;
                group.add(body);

                const headGeo = new THREE.BoxGeometry(0.9, 0.6, 0.6);
                const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a700, metalness: 0.8, roughness: 0.2 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.9;
                group.add(head);

                const crownGeo = new THREE.ConeGeometry(0.3, 0.8, 4);
                const crownMat = new THREE.MeshStandardMaterial({ color: 0xffea00, emissive: 0xffea00, metalness: 0.9 });
                const crown = new THREE.Mesh(crownGeo, crownMat);
                crown.position.y = 2.6;
                crown.rotation.y = Math.PI / 4;
                group.add(crown);

                const staffGeo = new THREE.BoxGeometry(0.08, 2.5, 0.08);
                const staff = new THREE.Mesh(staffGeo, mat);
                staff.position.set(0.9, 0.8, 0);
                group.add(staff);

                const crossGeo = new THREE.BoxGeometry(0.4, 0.08, 0.08);
                const cross = new THREE.Mesh(crossGeo, mat);
                cross.position.set(0.9, 2.0, 0);
                group.add(cross);

            } else if (shapeType === 'smith') {
                const bodyGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
                const body = new THREE.Mesh(bodyGeo, mat);
                body.position.y = 0.6;
                group.add(body);

                const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
                const headMat = new THREE.MeshStandardMaterial({ color: 0x808080, metalness: 0.5 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.5;
                group.add(head);

                const visorGeo = new THREE.BoxGeometry(0.5, 0.12, 0.08);
                const visorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                const visor = new THREE.Mesh(visorGeo, visorMat);
                visor.position.set(0, 1.5, 0.31);
                group.add(visor);

            } else if (shapeType === 'cao') {
                const bodyGeo = new THREE.BoxGeometry(1.6, 0.8, 0.8);
                const body = new THREE.Mesh(bodyGeo, mat);
                body.position.y = 0.4;
                group.add(body);

                const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const head = new THREE.Mesh(headGeo, mat);
                head.position.set(0.9, 0.6, 0);
                group.add(head);

            } else if (shapeType === 'box') {
                const geo = new THREE.BoxGeometry(1.3, 1.3, 1.3);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 0.65;
                group.add(mesh);
                
            } else if (shapeType === 'cone') {
                const geo = new THREE.ConeGeometry(1, 2.2, 8);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 1.1;
                group.add(mesh);
                
            } else if (shapeType === 'cylinder') {
                const geo = new THREE.CylinderGeometry(0.8, 1, 2, 12);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 1;
                group.add(mesh);
                
            } else if (shapeType === 'sphere') {
                const geo = new THREE.SphereGeometry(1, 24, 24);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 1;
                group.add(mesh);
                
            } else if (shapeType === 'octahedron') {
                const geo = new THREE.OctahedronGeometry(1.1, 0);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.y = 1.1;
                group.add(mesh);
            }

            currentMesh = group;
            scene.add(currentMesh);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if (!container || !renderer || !camera) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        window.addEventListener('resize', onWindowResize);

        const searchInput = document.getElementById('search-input');
        const filterTabs = document.getElementById('filter-tabs');
        const listContainer = document.getElementById('list-container');

        let currentFilter = 'all';
        let currentSearchQuery = '';
        let selectedEnemyId = 'farao';

        function filterEntities() {
            return bestiary.filter(enemy => {
                const matchesFilter = currentFilter === 'all' || enemy.category === currentFilter;
                const matchesSearch = enemy.name.toLowerCase().includes(currentSearchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });
        }

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${enemy.name}</span>
                        <span class="card-difficulty" style="--card-color: ${enemy.color}">${enemy.difficulty}</span>
                    </div>
                    <div class="card-category">${categoryNames[enemy.category]}</div>
                    <div class="card-stats">
                        <span>HP: <strong>${enemy.hp.toLocaleString()}</strong></span>
                        <span>VEL: <strong>${enemy.speed}</strong></span>
                    </div>
                `;

                card.addEventListener('click', () => {
                    selectEntity(enemy.id);
                });

                listContainer.appendChild(card);
            });
        }

        function selectEntity(id) {
            selectedEnemyId = id;
            
            document.querySelectorAll('.enemy-card').forEach(card => card.classList.remove('selected'));
            renderCards();

            const enemy = bestiary.find(e => e.id === id);
            if (!enemy) return;

            document.documentElement.style.setProperty('--dossier-color', enemy.color);
            document.documentElement.style.setProperty('--dossier-color-alpha', `${enemy.color}60`);

            document.getElementById('dossier-name').textContent = enemy.name;
            document.getElementById('dossier-lore').textContent = enemy.lore;
            
            const categoryNames = {
                comum: 'Comum (Sentinela)', guardião: 'Guardião de Elite', limbo: 'Boss de Limbo (Círculo)',
                elite: 'Chefe de Simulação', deus: 'Entidade Deus (Final)'
            };
            document.getElementById('dossier-category').textContent = categoryNames[enemy.category];
            document.getElementById('dossier-difficulty').textContent = enemy.difficulty;

            document.getElementById('stat-hp').textContent = enemy.hp.toLocaleString();
            document.getElementById('stat-speed').textContent = enemy.speed === 0 ? 'Teleporte' : enemy.speed.toFixed(1);
            document.getElementById('stat-score').textContent = enemy.score.toLocaleString();
            document.getElementById('stat-xp').textContent = enemy.xp.toLocaleString();

            const hpPct = Math.min((enemy.hp / 150000) * 100, 100);
            const speedPct = Math.min((enemy.speed / 8) * 100, 100);
            
            // Força o relógio da animação CSS reiniciando a largura a zero primeiro
            const hpBar = document.getElementById('bar-hp');
            const speedBar = document.getElementById('bar-speed');
            hpBar.style.width = '0%'; speedBar.style.width = '0%';
            
            setTimeout(() => {
                hpBar.style.width = `${hpPct}%`;
                speedBar.style.width = `${speedPct}%`;
            }, 50);

            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = '';
            
            if (enemy.skills && enemy.skills.length > 0) {
                enemy.skills.forEach(skill => {
                    const item = document.createElement('div');
                    item.className = 'skill-item';
                    item.innerHTML = `
                        <div class="skill-header">
                            <span class="skill-name">${skill.name}</span>
                            <span class="skill-tag ${skill.type}">${skill.type === 'passive' ? 'Passiva' : 'Ativa'}</span>
                        </div>
                        <p class="skill-desc">${skill.desc}</p>
                    `;
                    skillsList.appendChild(item);
                });
            } else {
                skillsList.innerHTML = '<div style="color: var(--text-secondary); text-align: center; padding: 2rem 0; font-family: var(--font-display);">/// REGISTO DE HABILIDADES NÃO ENCONTRADO ///</div>';
            }

            const spawnBox = document.getElementById('spawn-info-box');
            spawnBox.innerHTML = `
                <p style="margin-bottom: 0.8rem; color:var(--text-primary);"><strong style="color:var(--dossier-color);">///</strong> LOCALIZADOR E GATILHO:</p>
                <p style="margin-bottom: 1.5rem;">${enemy.spawn}</p>
                <p style="margin-bottom: 0.8rem; color:var(--text-primary);"><strong style="color:var(--dossier-color);">///</strong> RECOMPENSA DE DERROTA:</p>
                <p>O expurgo desta entidade gera <strong>${enemy.xp.toLocaleString()} XP</strong> e injeta <strong>${enemy.score.toLocaleString()} SCORE</strong> nos perfis sobreviventes.</p>
            `;

            update3DModel(enemy.shape, enemy.color);
        }

        filterTabs.addEventListener('click', (e) => {
            if (!e.target.classList.contains('tab-btn')) return;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');

            currentFilter = e.target.dataset.filter;
            renderCards();
        });

        searchInput.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value;
            renderCards();
        });

        document.querySelectorAll('.dossier-tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.dossier-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

                e.target.classList.add('active');
                const targetPanel = document.getElementById(`panel-${e.target.dataset.tab}`);
                if (targetPanel) targetPanel.classList.add('active');
            });
        });

        window.addEventListener('DOMContentLoaded', () => {
            init3D();
            renderCards();
            selectEntity(selectedEnemyId);
        });
    </script>
</body>
</html>
